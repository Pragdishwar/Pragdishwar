<svg width="600" height="40" viewBox="0 0 600 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .text-item {
        font-family: 'Courier New', Courier, monospace;
        font-weight: 700;
        font-size: 24px;
        fill: #2575fc;
        opacity: 0;
        display: none;
        animation: type_loop 12s infinite;
      }
      
      .text-item:nth-child(1) { animation-delay: 0s; display: block; }
      .text-item:nth-child(2) { animation-delay: 3s; display: block; }
      .text-item:nth-child(3) { animation-delay: 6s; display: block; }
      .text-item:nth-child(4) { animation-delay: 9s; display: block; }
      
      @keyframes type_loop {
        0%, 20% { opacity: 1; visibility: visible; }
        24.9%, 100% { opacity: 0; visibility: hidden; }
      }
      
      .cursor {
        animation: blink 0.7s infinite;
        fill: #2575fc;
      }
      
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
    </style>
  </defs>
  
  <rect width="600" height="40" fill="transparent"/>
  
  <text x="50%" y="25" dominant-baseline="middle" text-anchor="middle" class="text-item">Fintech Builder | Earn2Equity</text>
  <text x="50%" y="25" dominant-baseline="middle" text-anchor="middle" class="text-item">IoT Architect | Vision-AWD</text>
  <text x="50%" y="25" dominant-baseline="middle" text-anchor="middle" class="text-item">Full-Stack | React &amp; Supabase</text>
  <text x="50%" y="25" dominant-baseline="middle" text-anchor="middle" class="text-item">Designer | Borderland Arena</text>
  
  <!-- Cursor (Optional, better if anchored to text end but fixed for simplicity) -->
  <!-- <rect x="300" y="10" width="2" height="24" class="cursor"/> -->
</svg>
