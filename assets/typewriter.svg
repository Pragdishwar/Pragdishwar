<svg width="600" height="40" viewBox="0 0 600 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .text-item {
        font-family: 'Courier New', Courier, monospace;
        font-weight: 700;
        font-size: 22px;
        fill: #2575fc;
        visibility: hidden;
      }
      
      .reveal {
        animation: typing 3s infinite steps(40);
        fill: white;
      }
      
      .cursor {
        fill: #2575fc;
        animation: cursor_move 3s infinite steps(40), blink 0.7s infinite;
      }
      
      @keyframes typing {
        0% { width: 0; }
        20%, 85% { width: 600px; }
        90%, 100% { width: 0; }
      }
      
      @keyframes cursor_move {
        0% { transform: translateX(120px); }
        20%, 85% { transform: translateX(480px); }
        90%, 100% { transform: translateX(120px); }
      }
      
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      
      /* Control visibility of each line */
      .line1 { animation: line_vis 12s infinite 0s; }
      .line2 { animation: line_vis 12s infinite 3s; }
      .line3 { animation: line_vis 12s infinite 6s; }
      .line4 { animation: line_vis 12s infinite 9s; }
      
      @keyframes line_vis {
        0%, 24% { visibility: visible; }
        25%, 100% { visibility: hidden; }
      }
    </style>
    
    <mask id="typing_mask">
      <rect x="0" y="0" width="0" height="40" class="reveal" />
    </mask>
  </defs>
  
  <rect width="600" height="40" fill="transparent"/>
  
  <g mask="url(#typing_mask)">
    <text x="50%" y="24" dominant-baseline="middle" text-anchor="middle" class="text-item line1">Fintech Builder | Earn2Equity</text>
    <text x="50%" y="24" dominant-baseline="middle" text-anchor="middle" class="text-item line2">IoT Architect | Vision-AWD</text>
    <text x="50%" y="24" dominant-baseline="middle" text-anchor="middle" class="text-item line3">Full-Stack | React &amp; Supabase</text>
    <text x="50%" y="24" dominant-baseline="middle" text-anchor="middle" class="text-item line4">Designer | Borderland Arena</text>
  </g>
  
  <rect x="0" y="10" width="3" height="24" class="cursor"/>
</svg>
