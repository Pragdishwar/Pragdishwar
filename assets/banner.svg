<svg width="800" height="240" viewBox="0 0 800 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="paint0_linear_1_2" x1="0" y1="0" x2="800" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6a11cb"/>
      <stop offset="1" stop-color="#2575fc"/>
    </linearGradient>
    <style>
      @keyframes move_wave {
        0% { transform: translateX(0); }
        100% { transform: translateX(-50%); }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-7px); }
      }
      .wave {
        animation: move_wave 12s linear infinite;
      }
      .wave2 {
        animation: move_wave 18s linear infinite;
      }
      .wave3 {
        animation: move_wave 24s linear infinite;
      }
      .title {
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        font-weight: 800;
        font-size: 52px;
        fill: white;
        text-shadow: 0px 4px 15px rgba(0,0,0,0.4);
        animation: float 4s ease-in-out infinite;
      }
      .subtitle {
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        font-weight: 400;
        font-size: 18px;
        fill: rgba(255, 255, 255, 0.85);
        letter-spacing: 4px;
        text-transform: uppercase;
        animation: float 4s ease-in-out infinite;
        animation-delay: 0.2s;
      }
    </style>
  </defs>
  
  <!-- Wavy Background Shape -->
  <path d="M0 0H800V180C700 200 600 160 500 180C400 200 300 160 200 180C100 200 0 160 0 180V0Z" fill="url(#paint0_linear_1_2)"/>
  
  <!-- Content -->
  <g dominant-baseline="middle" text-anchor="middle">
    <text x="50%" y="40%" class="title">PRAGDISHWAR</text>
    <text x="50%" y="65%" class="subtitle">Designer | Researcher | Builder</text>
  </g>
  
  <!-- Animated Waves Over the Bottom Edge -->
  <g class="wave3" opacity="0.3">
    <path d="M0 170C200 150 400 190 600 170C800 150 1000 190 1200 170C1400 150 1600 190 1600 170V240H0V170Z" fill="white"/>
  </g>
  
  <g class="wave2" opacity="0.2">
    <path d="M0 180C200 200 400 160 600 180C800 200 1000 160 1200 180C1400 200 1600 160 1600 180V240H0V180Z" fill="white"/>
  </g>
  
  <g class="wave" opacity="0.1">
    <path d="M0 190C200 170 400 210 600 190C800 170 1000 210 1200 190C1400 170 1600 210 1600 190V240H0V190Z" fill="white"/>
  </g>
</svg>
