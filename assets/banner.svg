<svg width="800" height="300" viewBox="0 0 800 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="paint0_linear" x1="0" y1="0" x2="800" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6a11cb"/>
      <stop offset="1" stop-color="#2575fc"/>
    </linearGradient>
    <style>
      @keyframes move_wave {
        0% { transform: translateX(0); }
        100% { transform: translateX(-50%); }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }
      .wave {
        animation: move_wave 12s linear infinite;
      }
      .wave2 {
        animation: move_wave 18s linear infinite;
      }
      .wave3 {
        animation: move_wave 24s linear infinite;
      }
      .title {
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        font-weight: 800;
        font-size: 64px;
        fill: white;
        text-shadow: 0px 4px 20px rgba(0,0,0,0.5);
        animation: float 4s ease-in-out infinite;
      }
      .subtitle {
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        font-weight: 400;
        font-size: 22px;
        fill: rgba(255, 255, 255, 0.9);
        letter-spacing: 5px;
        text-transform: uppercase;
        animation: float 4s ease-in-out infinite;
        animation-delay: 0.2s;
      }
    </style>
    
    <mask id="banner_mask">
      <path d="M0 0H800V220C700 250 600 190 500 220C400 250 300 190 200 220C100 250 0 190 0 220V0Z" fill="white"/>
    </mask>
  </defs>
  
  <!-- Main Background Container -->
  <g mask="url(#banner_mask)">
    <rect width="800" height="260" fill="url(#paint0_linear)"/>
    
    <!-- Animated Waves -->
    <g class="wave3" opacity="0.4">
      <path d="M0 180C200 150 400 210 600 180C800 150 1000 210 1200 180C1400 150 1600 210 1600 180V260H0V180Z" fill="#12002e"/>
    </g>
    
    <g class="wave2" opacity="0.3">
      <path d="M0 200C200 230 400 170 600 200C800 230 1000 170 1200 200C1400 230 1600 170 1600 200V260H0V200Z" fill="#001a3d"/>
    </g>
    
    <g class="wave" opacity="0.2">
      <path d="M0 220C200 190 400 250 600 220C800 190 1000 250 1200 220C1400 190 1600 250 1600 220V260H0V220Z" fill="#2575fc"/>
    </g>
  </g>
  
  <!-- Floating Content -->
  <g dominant-baseline="middle" text-anchor="middle">
    <text x="50%" y="40%" class="title">PRAGDISHWAR</text>
    <text x="50%" y="65%" class="subtitle">Designer | Researcher | Builder</text>
  </g>
</svg>
