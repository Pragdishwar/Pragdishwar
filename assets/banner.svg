<svg width="800" height="200" viewBox="0 0 800 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="paint0_linear_1_2" x1="0" y1="0" x2="800" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6a11cb"/>
      <stop offset="1" stop-color="#2575fc"/>
    </linearGradient>
    <style>
      @keyframes move_wave {
        0% { transform: translateX(0); }
        100% { transform: translateX(-50%); }
      }
      .wave {
        animation: move_wave 10s linear infinite;
      }
      .wave2 {
        animation: move_wave 15s linear infinite;
      }
      .wave3 {
        animation: move_wave 20s linear infinite;
      }
      .title {
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        font-weight: 800;
        font-size: 48px;
        fill: white;
        text-shadow: 0px 4px 10px rgba(0,0,0,0.3);
      }
      .subtitle {
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        font-weight: 400;
        font-size: 18px;
        fill: rgba(255, 255, 255, 0.8);
        letter-spacing: 2px;
      }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="200" fill="url(#paint0_linear_1_2)"/>
  
  <!-- Content -->
  <text x="50%" y="45%" dominant-baseline="middle" text-anchor="middle" class="title">PRAGDISHWAR</text>
  <text x="50%" y="70%" dominant-baseline="middle" text-anchor="middle" class="subtitle">BUILDING THE FUTURE OF FINTECH &amp; IOT</text>
  
  <!-- Waves Layer 1 -->
  <g class="wave3" opacity="0.3">
    <path d="M0 160C200 140 400 180 600 160C800 140 1000 180 1200 160C1400 140 1600 180 1600 160V200H0V160Z" fill="white"/>
  </g>
  
  <!-- Waves Layer 2 -->
  <g class="wave2" opacity="0.2">
    <path d="M0 170C200 190 400 150 600 170C800 190 1000 150 1200 170C1400 190 1600 150 1600 170V200H0V170Z" fill="white"/>
  </g>
  
  <!-- Waves Layer 3 -->
  <g class="wave" opacity="0.1">
    <path d="M0 180C200 160 400 200 600 180C800 160 1000 200 1200 180C1400 160 1600 200 1600 180V200H0V180Z" fill="white"/>
  </g>
</svg>
